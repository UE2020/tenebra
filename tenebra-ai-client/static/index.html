<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenebra AI Client</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <button id="menuToggle" aria-label="Toggle Sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
    </button>
    <div class="glass-container">
        <!-- Sidebar / Controls -->
        <aside class="sidebar glass">
            <div class="logo">
                <span class="pulse"></span>
                <h1>Tenebra AI</h1>
            </div>
            <div class="connection-controls">
                <input type="text" id="addressInput" placeholder="Server Address (e.g. localhost:8080)">
                <input type="password" id="passwordInput" placeholder="Password">
                <select id="modelSelect">
                    <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite</option>
                    <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
                    <option value="gemma-4-31b-it">Gemma 4 31B IT</option>
                </select>
                <button id="connectBtn">Connect</button>
            </div>
            <div class="status-panel">
                <p>Status: <span id="status">Disconnected</span></p>
                <p>Session Spend: <span id="spend">$0.000</span></p>
                <div class="stats">
                    <span id="latency">-- ms</span>
                    <span id="fps">-- fps</span>
                </div>
            </div>
        </aside>

        <!-- Main Content (Video) -->
        <main class="video-container glass">
            <div class="video-placeholder" id="videoPlaceholder">
                <div class="placeholder-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent)"
                        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="23 7 16 12 23 17 23 7"></polygon>
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                    </svg>
                </div>
                <span>AWAITING LINK</span>
            </div>
            <video id="remoteVideo" autoplay playsinline></video>
            <canvas id="overlayCanvas"></canvas>
            <div class="ai-overlay" id="aiOverlay">
                <div class="scanning-bar"></div>
                <div class="ai-thought" id="aiThought">Waiting for instruction...</div>
            </div>
        </main>

        <!-- Unified Agent Terminal -->
        <section class="chat-container glass">
            <div class="chat-header">
                <h2>Agent Terminal</h2>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    Hello! I'm your AI agent. Connect to a Tenebra server to start controlling it.
                </div>
            </div>
            <div class="chat-input-area">
                <div class="context-indicators" id="contextIndicators" style="display: none;">
                    <span id="contextBadge" class="context-badge"></span>
                    <input type="file" id="fileInput" accept=".pdf" style="display: none;">
                </div>
                <div class="chat-input-pill glass">
                    <button id="uploadBtn" class="icon-btn" title="Upload Document">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                            </path>
                        </svg>
                    </button>

                    <textarea id="userInput" placeholder="Ask Tenebra to do something..." rows="1"></textarea>

                    <button id="sendBtn" class="icon-btn primary-icon" title="Send (Enter)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="19" x2="12" y2="5"></line>
                            <polyline points="5 12 12 5 19 12"></polyline>
                        </svg>
                    </button>
                    <button id="stopBtn" class="icon-btn danger-icon" style="display:none;" title="Stop AI">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12" rx="2" ry="2"></rect>
                        </svg>
                    </button>
                </div>
            </div>
        </section>
    </div>

    <script src="client.js"></script>
</body>

</html>
